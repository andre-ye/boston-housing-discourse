<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Boston Reddit — Globe</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root {
    --bg: #0a0c12;
    --bg-soft: #11141c;
    --fg: #dce3ef;
    --fg-dim: #8794ab;
    --fg-mute: #5b677f;
    --line: #1a2030;
    --accent: #7cf0c9;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 13px;
    height: 100%; width: 100%;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  #app {
    position: relative;
    height: 100vh; width: 100vw;
  }
  #nav {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 360px;
    max-width: 38%;
    z-index: 5;
    padding: 18px 14px 18px 18px;
    overflow: hidden;
    display: flex; flex-direction: column;
    background: linear-gradient(90deg,
      rgba(8,10,16,0.78) 0%,
      rgba(8,10,16,0.62) 80%,
      rgba(8,10,16,0.0) 100%);
    pointer-events: none;
  }
  #nav > * { pointer-events: auto; }
  #nav-header {
    margin-bottom: 14px;
  }
  #nav-header h1 {
    margin: 0 0 4px 0;
    font-size: 16px; font-weight: 600; letter-spacing: 0.2px;
  }
  #nav-header .sub {
    font-size: 11.5px; color: var(--fg-dim);
    letter-spacing: 0.2px;
  }
  #breadcrumbs {
    display: flex; align-items: center; gap: 6px;
    flex-wrap: wrap;
    min-height: 22px;
    margin: 8px 0 10px;
    font-size: 11.5px; color: var(--fg-dim);
  }
  #breadcrumbs .crumb {
    cursor: pointer;
    padding: 2px 7px;
    border: 1px solid var(--line);
    border-radius: 11px;
    transition: all 0.15s;
  }
  #breadcrumbs .crumb:hover { color: var(--fg); border-color: #2c3850; }
  #breadcrumbs .crumb.active { color: var(--fg); background: #182032; border-color: #2c3850; }
  #breadcrumbs .sep { opacity: 0.4; }

  #nav-bars {
    flex: 1;
    position: relative;
    display: flex;
    gap: 22px;
    min-height: 0;
    padding-right: 4px;
  }
  .bar-column {
    position: relative;
    display: flex; flex-direction: column;
    min-width: 0;
    flex: 1 1 0;
    transition: flex-basis 0.3s ease;
  }
  .bar-column.collapsed {
    flex: 0 0 0px;
    opacity: 0;
    pointer-events: none;
  }
  .bar-col-title {
    font-size: 10.5px; font-weight: 600; letter-spacing: 0.4px;
    text-transform: uppercase; color: var(--fg-mute);
    margin-bottom: 8px; white-space: nowrap;
  }
  .bar-stack {
    flex: 1;
    position: relative;
    border-radius: 6px;
    overflow: hidden;
    background: rgba(255,255,255,0.02);
  }
  #ribbons-overlay {
    position: absolute;
    pointer-events: none;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 5;
  }
  .bar-seg {
    position: absolute; left: 0; right: 0;
    padding: 0 8px;
    display: flex; align-items: center;
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.18s, filter 0.18s, opacity 0.18s;
    border-left: 3px solid transparent;
  }
  .bar-seg:hover {
    filter: brightness(1.15);
    transform: translateX(2px);
  }
  .bar-seg.active {
    border-left-color: rgba(255,255,255,0.85);
  }
  .bar-seg.faded {
    opacity: 0.35;
  }
  .bar-seg .bg {
    position: absolute; inset: 0;
    opacity: 0.85;
  }
  .bar-seg .label {
    position: relative; z-index: 2;
    white-space: nowrap;
    text-overflow: ellipsis;
    overflow: hidden;
    font-size: 11px;
    color: #1a1f2c;
    font-weight: 600;
    flex: 1;
    min-width: 0;
  }
  .bar-seg .pct {
    position: relative; z-index: 2;
    font-size: 10px;
    color: rgba(26,31,44,0.7);
    font-variant-numeric: tabular-nums;
    margin-left: 6px;
    font-weight: 600;
  }
  .ribbons {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 1;
  }
  .ribbons svg { width: 100%; height: 100%; }

  /* Right: globe */
  #globe-root {
    position: relative;
    background: radial-gradient(ellipse at center, #0e1220 0%, #05060b 70%);
    overflow: hidden;
  }
  #globe-canvas {
    position: absolute; inset: 0; display: block;
    width: 100%; height: 100%;
    cursor: grab;
  }
  #globe-canvas.grabbing { cursor: grabbing; }
  #globe-overlay {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  #focus-card {
    position: absolute; right: 22px; bottom: 22px;
    pointer-events: auto;
    padding: 14px 16px 16px;
    min-width: 220px; max-width: 340px;
    background: rgba(14,17,26,0.92);
    border: 1px solid var(--line);
    border-radius: 10px;
    backdrop-filter: blur(8px);
    opacity: 0; transform: translateY(6px);
    transition: opacity 0.2s, transform 0.2s;
  }
  #focus-card.show { opacity: 1; transform: none; }
  #focus-card .title {
    font-size: 13px; font-weight: 600;
    margin: 0 0 2px 0;
  }
  #focus-card .kind {
    font-size: 10.5px; letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--fg-mute);
    margin-bottom: 4px;
  }
  #focus-card .meta {
    font-size: 11px; color: var(--fg-dim);
  }
  #point-card {
    position: absolute;
    padding: 10px 12px;
    background: rgba(14,17,26,0.96);
    border: 1px solid var(--line);
    border-radius: 8px;
    backdrop-filter: blur(8px);
    max-width: 360px;
    font-size: 11.5px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.12s;
    z-index: 10;
  }
  #point-card.show { opacity: 1; pointer-events: auto; }
  #point-card .pc-subreddit {
    font-size: 10px; letter-spacing: 0.3px;
    color: var(--fg-mute); margin-bottom: 3px;
  }
  #point-card .pc-title {
    font-weight: 600; color: var(--fg);
    margin-bottom: 4px;
    line-height: 1.3;
  }
  #point-card .pc-body {
    color: var(--fg-dim);
    line-height: 1.35;
    max-height: 100px; overflow: hidden;
  }
  #hud {
    position: absolute; top: 16px; right: 18px;
    display: flex; gap: 8px; flex-direction: column; align-items: flex-end;
    pointer-events: auto;
  }
  #hud .hud-btn {
    background: rgba(14,17,26,0.88);
    border: 1px solid var(--line);
    color: var(--fg-dim);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  #hud .hud-btn:hover { color: var(--fg); border-color: #2c3850; }
  #hud .hud-btn.on { color: var(--accent); border-color: rgba(124,240,201,0.4); }
  #ctrlpad {
    position: absolute;
    right: 18px; bottom: 18px;
    display: flex; gap: 14px; align-items: flex-end;
    pointer-events: auto;
    user-select: none;
  }
  .kbgroup { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .kbrow { display: flex; gap: 4px; }
  .kbzoom { display: flex; flex-direction: column; gap: 4px; }
  .kbkey {
    width: 30px; height: 30px;
    background: rgba(14,17,26,0.85);
    border: 1px solid var(--line);
    color: var(--fg);
    border-radius: 5px;
    font-size: 14px;
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 0 rgba(255,255,255,0.04) inset, 0 1px 2px rgba(0,0,0,0.4);
    transition: all 0.12s;
  }
  .kbkey:hover { color: var(--accent); border-color: rgba(124,240,201,0.4); }
  .kbkey:active { transform: translateY(1px); background: rgba(20,24,34,0.95); }
  .kbkey.kbz { width: 30px; position: relative; }
  .kbkey.kbz sub {
    position: absolute; bottom: 1px; right: 3px;
    font-size: 8px; color: var(--fg-mute); font-weight: 600;
  }
  #globe-labels {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    overflow: visible;
  }
  #globe-labels .lbl-cluster {
    font: 600 11.5px 'Inter', system-ui, sans-serif;
    letter-spacing: 0.3px;
    fill: #f3f6fb;
    paint-order: stroke;
    stroke: rgba(8,10,16,0.85);
    stroke-width: 3px;
    stroke-linejoin: round;
    text-anchor: middle;
    dominant-baseline: middle;
    transition: opacity 0.18s;
  }
  #globe-labels .lbl-sub {
    font: 500 10.5px 'Inter', system-ui, sans-serif;
    letter-spacing: 0.2px;
    fill: #cdd6e4;
    paint-order: stroke;
    stroke: rgba(8,10,16,0.85);
    stroke-width: 2.5px;
    text-anchor: middle;
    dominant-baseline: middle;
  }

  .detail-card {
    position: absolute;
    right: 22px; top: 22px;
    width: 360px; max-height: calc(100vh - 44px);
    overflow-y: auto;
    pointer-events: auto;
    padding: 16px 18px 18px;
    background: rgba(14,17,26,0.96);
    border: 1px solid var(--line);
    border-radius: 10px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 28px rgba(0,0,0,0.45);
    z-index: 12;
  }
  .detail-card.hidden { display: none; }
  .detail-card .dc-close {
    position: absolute; right: 8px; top: 6px;
    background: none; border: none; color: var(--fg-dim);
    font-size: 18px; cursor: pointer; padding: 4px 8px;
  }
  .detail-card .dc-close:hover { color: var(--fg); }
  .detail-card .dc-meta {
    font-size: 10.5px; letter-spacing: 0.4px;
    color: var(--fg-mute); margin-bottom: 4px;
    text-transform: uppercase;
  }
  .detail-card .dc-title {
    margin: 0 0 8px 0; font-size: 14px; font-weight: 600;
    color: var(--fg); line-height: 1.3;
  }
  .detail-card .dc-body {
    color: var(--fg-dim); font-size: 12px; line-height: 1.45;
    white-space: pre-wrap; word-wrap: break-word;
    margin-bottom: 12px;
  }
  .detail-card .dc-link {
    display: inline-block; font-size: 11.5px;
    color: var(--accent); text-decoration: none;
    border-bottom: 1px dashed currentColor; padding-bottom: 1px;
  }

  #loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 12px;
    background: rgba(5,6,11,0.85);
    z-index: 20;
    transition: opacity 0.3s;
  }
  #loading.gone { opacity: 0; pointer-events: none; }
  #loading .spinner {
    width: 40px; height: 40px;
    border: 2px solid var(--line);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  #loading .msg { color: var(--fg-dim); font-size: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #222b3e; border-radius: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="app">
  <aside id="nav">
    <div id="nav-header">
      <h1>Boston Reddit, 2015–2025</h1>
      <div class="sub">422,114 posts &amp; comments · 50 clusters · 194 subtopics</div>
      <div id="breadcrumbs"></div>
    </div>
    <div id="nav-bars">
      <div class="bar-column" id="col-l1">
        <div class="bar-col-title">Clusters</div>
        <div class="bar-stack" id="stack-l1"></div>
      </div>
      <div class="bar-column collapsed" id="col-l2">
        <div class="bar-col-title">Subtopics</div>
        <div class="bar-stack" id="stack-l2"></div>
      </div>
      <div class="bar-column collapsed" id="col-l3">
        <div class="bar-col-title">Positions</div>
        <div class="bar-stack" id="stack-l3"></div>
      </div>
      <svg id="ribbons-overlay"></svg>
    </div>
  </aside>

  <section id="globe-root" style="position:absolute; inset:0; z-index:1;">
    <canvas id="globe-canvas"></canvas>
    <div id="globe-overlay">
      <div id="hud">
        <button class="hud-btn on" id="btn-threads">Thread links</button>
        <button class="hud-btn on" id="btn-labels">Labels</button>
        <button class="hud-btn" id="btn-reset">Reset view</button>
      </div>
      <div id="ctrlpad">
        <div class="kbgroup">
          <button class="kbkey" data-act="up">↑</button>
          <div class="kbrow">
            <button class="kbkey" data-act="left">←</button>
            <button class="kbkey" data-act="down">↓</button>
            <button class="kbkey" data-act="right">→</button>
          </div>
        </div>
        <div class="kbzoom">
          <button class="kbkey kbz" data-act="zoomin"><span>+</span><sub>W</sub></button>
          <button class="kbkey kbz" data-act="zoomout"><span>−</span><sub>S</sub></button>
        </div>
      </div>
      <div id="focus-card">
        <div class="kind" id="focus-kind">cluster</div>
        <div class="title" id="focus-title">—</div>
        <div class="meta" id="focus-meta"></div>
      </div>
      <div id="point-card"></div>
      <svg id="globe-labels" pointer-events="none"></svg>
      <div id="detail-card" class="detail-card hidden">
        <button class="dc-close" id="dc-close" aria-label="Close">×</button>
        <div class="dc-meta" id="dc-meta"></div>
        <h3 class="dc-title" id="dc-title"></h3>
        <div class="dc-body" id="dc-body"></div>
        <a class="dc-link" id="dc-link" href="#" target="_blank" rel="noopener">Open on Reddit ↗</a>
      </div>
    </div>
    <div id="loading">
      <div class="spinner"></div>
      <div class="msg" id="loading-msg">Loading sphere coordinates…</div>
    </div>
  </section>
</div>

<script type="module" src="./js/data.js"></script>
<script type="module" src="./js/nav.js"></script>
<script type="module" src="./js/globe.js"></script>
<script type="module" src="./js/main.js"></script>
</body>
</html>
