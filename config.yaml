# Primary data path: Academic Torrents–style monthly dumps (RC_*.zst / RS_*.zst).
# Overnight: ./run_overnight.sh (place all .zst files under dumps/). Optional API top-up: collect_reddit.py.

# Metro Boston + transit: names must match Reddit display names (case-insensitive in dumps).
subreddits:
  - boston
  - AskBoston
  - CambridgeMA
  - cambridge_ma
  - Somerville
  - massachusetts
  - MBTA
  - Brookline
  - medfordma
  - Malden
  - newtonma
  - quincyma
  - waltham
  - arlingtonma
  - belmontma
  - lexingtonma
  - Needham
  - MelroseMA
  - EastBoston
  - Allston
  - Brighton
  - JamaicaPlain
  - Roslindale
  - WatertownMA
  - ChelseaMA
  - Everett
  - Revere
  - NorthShoreMA
  - SouthShore
  - WorcesterMA

# PRAW-only (collect_reddit.py); ignored by ingest.
search_queries:
  - housing
  - rent apartment
  - commute
  - MBTA
  - landlord
  - red line
  - green line

# Housing OR commute / transit (case-insensitive). Tight enough to drop most unrelated chatter.
# Parking: avoid bare "parking" (matched "parking lot" everywhere); use phrases like street parking, parking permit, etc.
# Permit: bare "permit" matched "permitting" (unrelated). Use building/zoning phrases; parking permit is under parking\\s+(…|permit|…) above.
# GLX = Green Line Extension (MBTA). "greenline" catches one-word mentions.
# Single-token alternates use \\b…\\b; multi-word phrases use \\s+ anchors. Plural-friendly where common (apartments?, landlords?). Exception: refinanc\\w*.
keyword_regex: "(\\bhousing\\b|affordable\\s+housing|\\bapartments?\\b|\\bcondo\\b|\\bco-?op\\b|\\btownhouse\\b|\\bduplex\\b|\\btriplex\\b|\\brent\\b|\\brentals?\\b|\\brenters?\\b|\\blandlords?\\b|\\btenants?\\b|\\blease\\b|\\bsublet\\b|\\broommates?\\b|\\bevict\\b|\\beviction\\b|\\bmortgages?\\b|\\brefinanc\\w*|\\brealtors?\\b|broker\\s+fee|\\bzillow\\b|\\bcraigslist\\b|section\\s*8|\\bhud\\b|\\bvoucher\\b|income\\s*restrict|\\bzoning\\b|building\\s+code|building\\s+permit|special\\s+permit|permit\\s+application|zoning\\s+permit|occupancy\\s+permit|\\bcommute\\b|commuter\\s+rail|\\bmbta\\b|\\bred\\s+line\\b|\\bgreen\\s+line\\b|\\borange\\s+line\\b|\\bblue\\s+line\\b|\\bsilver\\s+line\\b|\\bglx\\b|\\bgreenline\\b|\\bcharliecard\\b|\\bdelay\\b|\\bdetour\\b|\\bshuttle\\b|\\bbus\\b|shuttle\\s+bus|\\btraffic\\b|street\\s+parking|resident\\s+parking|meter\\s+parking|overnight\\s+parking|parking\\s+(space|spot|permit|sticker|garage|deck|ticket|rules|fee)|visitor\\s+parking|park\\s+and\\s+ride|bike\\s+lane|\\bbicycles?\\b|\\bcyclists?\\b|\\bcycling\\b|\\bpedestrian\\b|\\bwalkable\\b|driving\\s+to\\s+work|rush\\s+hour|\\bi-?93\\b|\\bi-?90\\b|mass\\s+pike|\\bstorrow\\b)"

# Length after strip (Unicode). 0 = no minimum. Submissions: title + body; comments: body only.
# Link-only posts with empty body count title length only — may drop if below min_chars_submission.
min_chars_submission: 80
min_chars_comment: 120

time_filter: all

max_submissions_per_query: 250
max_top_level_comments_per_submission: 50
replace_more_limit: 0
